kind = "web"
previewPath = "/"
title = "NJ Upholstery"
version = "1.0.0"
id = "artifacts/njupholstery"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20445

[services.development]
run = "pnpm --filter @workspace/njupholstery run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/njupholstery", "run", "build" ]
publicDir = "artifacts/njupholstery/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20445"
BASE_PATH = "/"
